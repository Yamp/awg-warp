services:
  warp:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile.warp
    image: local/awg-warp-warp:latest
    container_name: awg-warp-warp
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
    ports:
      - "${AWG_PORT:-51820}:${AWG_PORT:-51820}/udp"
    volumes:
      - ./data/warp:/data
    healthcheck:
      test: ["CMD-SHELL", "wg show warp >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3

  awg:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile.awg
      args:
        AMNEZIAWG_GO_REF: ${AMNEZIAWG_GO_REF:-master}
        AMNEZIAWG_TOOLS_REF: ${AMNEZIAWG_TOOLS_REF:-master}
    image: local/awg-warp-awg:latest
    container_name: awg-warp-awg
    restart: unless-stopped
    network_mode: "service:warp"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    depends_on:
      warp:
        condition: service_started
    volumes:
      - ./data/awg:/data
